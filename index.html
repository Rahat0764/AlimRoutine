<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আলিম রুটিন ২০২৬</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4B5563; }
    </style>
</head>
<body class="bg-gray-900 font-sans text-white min-h-screen flex items-center justify-center p-4">

    
    <div class="w-full max-w-md bg-gray-800 rounded-3xl shadow-2xl overflow-hidden border border-gray-700 relative">
        
        
        <div class="absolute top-4 right-4 z-20">
            <a href="https://linkdin.com/in/RahatAhmedX" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1.5 bg-black/30 hover:bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-full text-xs text-blue-200 transition-all border border-blue-500/30">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Developed by <span class="font-bold text-blue-300">Rahat</span>
            </a>
        </div>

        
        <div id="next-exam-section" class="bg-gradient-to-br from-blue-700 to-slate-900 p-6 rounded-b-3xl shadow-lg relative z-10 pt-14">
            
        </div>

        
        <div class="px-5 pt-5 pb-2">
            <div class="flex gap-2 p-1 bg-gray-900 rounded-xl mb-3">
                <button id="btn-science" class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all bg-blue-600 text-white shadow-md">Science</button>
                <button id="btn-arts" class="flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-gray-200">Arts</button>
            </div>

            <div id="arts-options" class="relative hidden">
                <select id="select-optional" class="w-full appearance-none bg-gray-700/50 border border-gray-600 text-gray-200 text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-500 font-medium">
                    <option value="Civics">ঐচ্ছিক: পৌরনীতি ও সুশাসন</option>
                    <option value="Economics">ঐচ্ছিক: অর্থনীতি</option>
                </select>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute right-4 top-3 text-gray-400 pointer-events-none"><path d="m6 9 6 6 6-6"/></svg>
            </div>
        </div>

        
        <div class="px-4 pb-4 h-[350px] overflow-y-auto custom-scrollbar">
            <h3 id="routine-title" class="text-xs font-semibold text-gray-400 mb-3 pl-1 flex items-center gap-2 mt-2">
                
            </h3>
            <div id="routine-list" class="space-y-2.5">
                
            </div>
        </div>

    </div>

    
    <script>
        
        const toBnNum = (num) => num.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);
        const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('bn-BD', { day: 'numeric', month: 'short' });
        const formatDay = (dateStr) => new Date(dateStr).toLocaleDateString('bn-BD', { weekday: 'long' });

        
        const ICONS = {
            clock: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-300 animate-pulse"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
            calendar14: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>`,
            calendar10: `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>`,
            check: `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-green-400 mb-3"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,
            alert: `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`,
            book: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`
        };

        // Routine Data
        const scienceRoutine = [
            { id: 's1', subject: "কুরআন মাজিদ", date: "2026-07-02T10:00:00" },
            { id: 's2', subject: "আরবি সাহিত্য (বিজ্ঞান)", date: "2026-07-04T10:00:00" },
            { id: 's3', subject: "বাংলা ১ম পত্র", date: "2026-07-06T10:00:00" },
            { id: 's4', subject: "বাংলা ২য় পত্র", date: "2026-07-08T10:00:00" },
            { id: 's5', subject: "ইংরেজি ১ম পত্র", date: "2026-07-11T10:00:00" },
            { id: 's6', subject: "ইংরেজি ২য় পত্র", date: "2026-07-13T10:00:00" },
            { id: 's7', subject: "হাদিস ও উসুলুল হাদিস", date: "2026-07-16T10:00:00" },
            { id: 's8', subject: "ফিকহ", date: "2026-07-18T10:00:00" },
            { id: 's9', subject: "তথ্য ও যোগাযোগ প্রযুক্তি", date: "2026-07-22T10:00:00" },
            { id: 's10', subject: "পদার্থবিজ্ঞান ১ম পত্র", date: "2026-07-25T10:00:00" },
            { id: 's11', subject: "পদার্থবিজ্ঞান ২য় পত্র", date: "2026-07-27T10:00:00" },
            { id: 's12', subject: "রসায়ন ১ম পত্র", date: "2026-07-29T10:00:00" },
            { id: 's13', subject: "রসায়ন ২য় পত্র", date: "2026-08-01T10:00:00" },
            { id: 's14', subject: "জীববিজ্ঞান ১ম পত্র", date: "2026-08-02T10:00:00" },
            { id: 's15', subject: "জীববিজ্ঞান ২য় পত্র", date: "2026-08-04T10:00:00" },
            { id: 's16', subject: "উচ্চতর গণিত ১ম পত্র", date: "2026-08-06T10:00:00" },
            { id: 's17', subject: "উচ্চতর গণিত ২য় পত্র", date: "2026-08-08T10:00:00" }
        ].sort((a, b) => new Date(a.date) - new Date(b.date));

        const buildArtsRoutine = (optionalSub) => {
            let artsBase = [
                { id: 'a1', subject: "কুরআন মাজিদ", date: "2026-07-02T10:00:00" },
                { id: 'a2', subject: "আরবি ১ম পত্র (সাধারণ)", date: "2026-07-04T10:00:00" },
                { id: 'a3', subject: "বাংলা ১ম পত্র", date: "2026-07-06T10:00:00" },
                { id: 'a4', subject: "বাংলা ২য় পত্র", date: "2026-07-08T10:00:00" },
                { id: 'a5', subject: "ইংরেজি ১ম পত্র", date: "2026-07-11T10:00:00" },
                { id: 'a6', subject: "ইংরেজি ২য় পত্র", date: "2026-07-13T10:00:00" },
                { id: 'a7', subject: "আরবি ২য় পত্র", date: "2026-07-15T10:00:00" },
                { id: 'a8', subject: "হাদিস ও উসুলুল হাদিস", date: "2026-07-16T10:00:00" },
                { id: 'a9', subject: "আল ফিকহ ১ম পত্র", date: "2026-07-18T10:00:00" },
                { id: 'a10', subject: "আল ফিকহ ২য় পত্র", date: "2026-07-19T10:00:00" },
                { id: 'a11', subject: "তথ্য ও যোগাযোগ প্রযুক্তি", date: "2026-07-22T10:00:00" },
                { id: 'a12', subject: "বালাগাত ও মানতিক", date: "2026-07-25T10:00:00" },
                { id: 'a13', subject: "ইসলামের ইতিহাস", date: "2026-07-27T10:00:00" }
            ];

            if (optionalSub === 'Civics') {
                artsBase.push(
                    { id: 'a14c', subject: "পৌরনীতি ও সুশাসন ১ম পত্র", date: "2026-07-29T10:00:00" },
                    { id: 'a15c', subject: "পৌরনীতি ও সুশাসন ২য় পত্র", date: "2026-08-01T10:00:00" }
                );
            } else {
                artsBase.push(
                    { id: 'a14e', subject: "অর্থনীতি ১ম পত্র", date: "2026-07-29T10:00:00" },
                    { id: 'a15e', subject: "অর্থনীতি ২য় পত্র", date: "2026-08-01T10:00:00" }
                );
            }
            return artsBase.sort((a, b) => new Date(a.date) - new Date(b.date));
        };

        
        let currentGroup = 'Science';
        let artsOptional = 'Civics';
        let currentRoutine = scienceRoutine;

        
        const getStatus = (examDateStr, currentTime) => {
            const examDate = new Date(examDateStr);
            const diffMs = examDate - currentTime;
            
            if (diffMs < 0) {
                const examEnd = new Date(examDate.getTime() + 3 * 60 * 60 * 1000);
                if (currentTime > examEnd) return { status: 'completed', diffMs: 0 };
                return { status: 'ongoing', diffMs: 0 };
            }

            const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diffMs % (1000 * 60)) / 1000);

            return { status: 'upcoming', days, hours, minutes, seconds, diffMs };
        };

        const calculateGap = (currentDate, prevDate) => {
            const d1 = new Date(prevDate);
            const d2 = new Date(currentDate);
            d1.setHours(0, 0, 0, 0);
            d2.setHours(0, 0, 0, 0);
            const diffDays = Math.floor((d2 - d1) / (1000 * 60 * 60 * 24)) - 1;
            return diffDays > 0 ? diffDays : 0;
        };

        
        const btnScience = document.getElementById('btn-science');
        const btnArts = document.getElementById('btn-arts');
        const artsOptionsDiv = document.getElementById('arts-options');
        const selectOptional = document.getElementById('select-optional');
        const nextExamSection = document.getElementById('next-exam-section');
        const routineListContainer = document.getElementById('routine-list');
        const routineTitle = document.getElementById('routine-title');

        function setGroup(group) {
            currentGroup = group;
            if (group === 'Science') {
                btnScience.className = "flex-1 py-2 text-sm font-semibold rounded-lg transition-all bg-blue-600 text-white shadow-md";
                btnArts.className = "flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-gray-200";
                artsOptionsDiv.classList.add('hidden');
                currentRoutine = scienceRoutine;
            } else {
                btnArts.className = "flex-1 py-2 text-sm font-semibold rounded-lg transition-all bg-blue-600 text-white shadow-md";
                btnScience.className = "flex-1 py-2 text-sm font-semibold rounded-lg transition-all text-gray-400 hover:text-gray-200";
                artsOptionsDiv.classList.remove('hidden');
                currentRoutine = buildArtsRoutine(artsOptional);
            }
            renderRoutineList();
            updateLiveTimer();
        }

        btnScience.addEventListener('click', () => setGroup('Science'));
        btnArts.addEventListener('click', () => setGroup('Arts'));
        selectOptional.addEventListener('change', (e) => {
            artsOptional = e.target.value;
            currentRoutine = buildArtsRoutine(artsOptional);
            renderRoutineList();
            updateLiveTimer();
        });

        
        function renderRoutineList() {
            const currentTime = new Date();
            const upcomingExams = currentRoutine.filter(exam => getStatus(exam.date, currentTime).status === 'upcoming');
            const nextExam = upcomingExams.length > 0 ? upcomingExams[0] : null;

            routineTitle.innerHTML = `${ICONS.book} সম্পূর্ণ রুটিন (${toBnNum(currentRoutine.length)} বিষয়)`;
            
            let html = '';
            currentRoutine.forEach((exam, index) => {
                const statusData = getStatus(exam.date, currentTime);
                const isNext = nextExam && nextExam.id === exam.id;
                let gapDays = index > 0 ? calculateGap(exam.date, currentRoutine[index - 1].date) : 0;

                let cardStyle = "bg-gray-800/80 border-gray-700";
                let textStyle = "text-gray-200";
                let badgeHTML = "";

                if (statusData.status === 'completed') {
                    cardStyle = "opacity-60 bg-gray-800/50 border-gray-800";
                    textStyle = "text-gray-500 line-through";
                    badgeHTML = `<span class="text-[10px] text-green-500 bg-green-500/10 px-2 py-0.5 rounded-full border border-green-500/20">সম্পন্ন</span>`;
                } else if (statusData.status === 'ongoing') {
                    cardStyle = "bg-green-900/20 border-green-500/40";
                    textStyle = "text-green-400 font-bold";
                    badgeHTML = `<span class="text-[10px] text-green-400 animate-pulse flex items-center gap-1">${ICONS.alert} চলছে</span>`;
                } else if (isNext) {
                    cardStyle = "bg-blue-900/30 border-blue-500/60 shadow-lg shadow-blue-900/20";
                    textStyle = "text-blue-300 font-bold";
                    badgeHTML = `<span class="text-[10px] text-blue-200 bg-blue-600 px-2 py-0.5 rounded-full shadow-sm">পরবর্তী</span>`;
                } else {
                    badgeHTML = `<span class="text-[10px] font-mono text-gray-400 bg-gray-700/50 px-2 py-0.5 rounded-full">${toBnNum(statusData.days)} দিন বাকি</span>`;
                }

                let gapBadgeHTML = "";
                if (index > 0 && statusData.status !== 'completed') {
                    gapBadgeHTML = `<span class="px-2 py-1 rounded-md font-medium ${gapDays > 0 ? 'bg-indigo-500/10 text-indigo-300' : 'bg-red-500/10 text-red-300'}">${gapDays > 0 ? `${toBnNum(gapDays)} দিন গ্যাপ` : 'কোনো গ্যাপ নেই'}</span>`;
                }

                html += `
                <div class="p-3 rounded-2xl border transition-all ${cardStyle}">
                    <div class="flex items-start justify-between mb-1">
                        <span class="text-[14px] leading-tight ${textStyle}">${exam.subject}</span>
                        <div class="flex-shrink-0 ml-2 mt-0.5">${badgeHTML}</div>
                    </div>
                    <div class="flex items-center justify-between text-xs mt-2">
                        <span class="text-gray-400 flex items-center gap-1.5 bg-gray-900/50 px-2 py-1 rounded-md">
                            ${ICONS.calendar10} ${formatDate(exam.date)} • ${formatDay(exam.date)}
                        </span>
                        ${gapBadgeHTML}
                    </div>
                </div>`;
            });
            routineListContainer.innerHTML = html;
        }

        
        function updateLiveTimer() {
            const currentTime = new Date();
            const upcomingExams = currentRoutine.filter(exam => getStatus(exam.date, currentTime).status === 'upcoming');
            const nextExam = upcomingExams.length > 0 ? upcomingExams[0] : null;

            let topHtml = `
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-sm font-semibold tracking-wider text-blue-200 uppercase flex items-center gap-2">
                    ${ICONS.clock} পরবর্তী পরীক্ষা
                </h2>
            </div>`;

            if (nextExam) {
                const status = getStatus(nextExam.date, currentTime);
                const values = [status.days, status.hours, status.minutes, status.seconds];
                const labels = ['দিন', 'ঘণ্টা', 'মিনিট', 'সেকেন্ড'];
                
                let boxes = values.map((val, idx) => `
                    <div class="bg-white/10 backdrop-blur-md rounded-xl p-2 flex flex-col justify-center border border-white/10 shadow-inner">
                        <span class="text-2xl font-bold font-mono text-white">${toBnNum(String(val).padStart(2, '0'))}</span>
                        <span class="text-[10px] uppercase tracking-wide mt-1 text-blue-200">${labels[idx]}</span>
                    </div>
                `).join('');

                topHtml += `
                <div>
                    <h1 class="text-2xl font-bold mb-1 leading-tight text-white">${nextExam.subject}</h1>
                    <p class="text-blue-200 text-sm mb-6 flex items-center gap-2 font-medium">
                        ${ICONS.calendar14} ${formatDate(nextExam.date)} • ${formatDay(nextExam.date)} (সকাল ১০:০০)
                    </p>
                    <div class="grid grid-cols-4 gap-2 text-center">
                        ${boxes}
                    </div>
                </div>`;
            } else {
                topHtml += `
                <div class="text-center py-6">
                    ${ICONS.check}
                    <h1 class="text-xl font-bold text-white">সব পরীক্ষা শেষ!</h1>
                    <p class="text-sm text-gray-400 mt-2">আলহামদুলিল্লাহ, আপনার পরীক্ষা সম্পন্ন হয়েছে।</p>
                </div>`;
            }
            nextExamSection.innerHTML = topHtml;
        }

        
        setGroup('Science'); 
        setInterval(updateLiveTimer, 1000);

    </script>
</body>
</html>
