<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a" id="theme-meta">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="পরীক্ষার রুটিন">
    <title>উচ্চমাধ্যমিক রুটিন ২০২৬</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #263348;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-blue-light: #60a5fa;
            --accent-glow: rgba(59,130,246,0.15);
            --accent-green: #10b981;
            --header-from: #1e3a5f;
            --header-to: #0f172a;
            --scrollbar-thumb: #334155;
            --tab-bg: #0f172a;
            
            --btn-install-hsc-bg: #3b82f6;
            --btn-install-hsc-hover: #2563eb;
            --btn-install-alim-bg: #10b981;
            --btn-install-alim-hover: #059669;
            --btn-install-text: #ffffff;
        }
        [data-theme="light"] {
            --bg-primary: #f0f4ff;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f8faff;
            --border-color: #dde5f4;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #2563eb;
            --accent-blue-light: #3b82f6;
            --accent-glow: rgba(37,99,235,0.1);
            --accent-green: #059669;
            --header-from: #1d4ed8;
            --header-to: #1e3a6e;
            --scrollbar-thumb: #bfdbfe;
            --tab-bg: #e8eef8;

            --btn-install-hsc-bg: #2563eb;
            --btn-install-hsc-hover: #1d4ed8;
            --btn-install-alim-bg: #059669;
            --btn-install-alim-hover: #047857;
            --btn-install-text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.4s ease, color 0.4s ease;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, var(--accent-glow), transparent);
            pointer-events: none;
            z-index: 0;
            transition: background 0.4s ease;
        }
        .app-wrapper {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            max-height: 800px;
            background: var(--bg-secondary);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03) inset;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            animation: wrapperIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes wrapperIn {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @media (max-width: 480px) {
            .app-wrapper { border-radius: 0; max-height: none; height: 100dvh; border-left: none; border-right: none; }
            body { padding: 0; }
        }
        .header-section {
            background: linear-gradient(160deg, var(--header-from), var(--header-to));
            padding: 14px 16px 18px;
            position: relative;
            flex-shrink: 0;
            transition: background 0.4s ease;
            overflow: hidden;
        }
        .header-section::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; position: relative; z-index: 2; }
        .dev-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(0,0,0,0.25); backdrop-filter: blur(12px);
            padding: 5px 10px; border-radius: 20px; font-size: 11px;
            color: #bfdbfe; border: 1px solid rgba(96,165,250,0.25);
            text-decoration: none; transition: background 0.2s, transform 0.2s;
        }
        .dev-badge:hover { background: rgba(0,0,0,0.4); transform: scale(1.03); }
        .dev-badge:active { transform: scale(0.97); }
        .dark-toggle {
            display: flex; align-items: center; gap: 5px;
            background: rgba(0,0,0,0.25); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
            padding: 5px 10px 5px 8px; cursor: pointer;
            transition: background 0.2s, transform 0.15s; flex-shrink: 0;
        }
        .dark-toggle:hover { background: rgba(0,0,0,0.38); transform: scale(1.04); }
        .dark-toggle:active { transform: scale(0.96); }
        .toggle-icon-wrap { width: 18px; height: 18px; position: relative; flex-shrink: 0; }
        .toggle-icon-wrap svg { position: absolute; inset: 0; transition: opacity 0.3s ease, transform 0.35s ease; }
        [data-theme="dark"] .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
        [data-theme="dark"] .icon-sun  { opacity: 0; transform: rotate(90deg) scale(0.5); }
        [data-theme="light"] .icon-moon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        [data-theme="light"] .icon-sun  { opacity: 1; transform: rotate(0deg) scale(1); }
        .toggle-label { font-size: 11px; font-weight: 600; color: #bfdbfe; white-space: nowrap; pointer-events: none; }

        .exam-switcher {
            display: flex; gap: 3px;
            background: rgba(0,0,0,0.28); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 22px; padding: 3px;
            margin-bottom: 14px; position: relative; z-index: 2;
        }
        .exam-switch-btn {
            flex: 1; padding: 6px 10px; font-size: 12px; font-weight: 700;
            border: none; border-radius: 18px; cursor: pointer;
            font-family: 'Noto Sans Bengali', sans-serif;
            letter-spacing: 0.03em;
            transition: all 0.3s cubic-bezier(0.34,1.2,0.64,1);
        }
        .exam-switch-btn.active-alim {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,0.45); transform: scale(1.03);
        }
        .exam-switch-btn.active-hsc {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff; box-shadow: 0 4px 14px rgba(59,130,246,0.45); transform: scale(1.03);
        }
        .exam-switch-btn.inactive-sw { background: transparent; color: rgba(255,255,255,0.45); }
        .exam-switch-btn.inactive-sw:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }

        .install-btn {
            display: flex; align-items: center; gap: 5px;
            color: var(--btn-install-text); padding: 6px 14px; border-radius: 20px;
            font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
            text-transform: uppercase; text-decoration: none;
            transition: all 0.2s ease; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .install-btn.hsc {
            background: var(--btn-install-hsc-bg);
            box-shadow: 0 4px 12px rgba(37,99,235,0.35);
        }
        .install-btn.hsc:hover { background: var(--btn-install-hsc-hover); transform: scale(1.04); box-shadow: 0 6px 16px rgba(37,99,235,0.5); }
        .install-btn.alim {
            background: var(--btn-install-alim-bg);
            box-shadow: 0 4px 12px rgba(16,185,129,0.35);
        }
        .install-btn.alim:hover { background: var(--btn-install-alim-hover); transform: scale(1.04); box-shadow: 0 6px 16px rgba(16,185,129,0.5); }
        .install-btn:active { transform: scale(0.97); }

        .next-exam-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: #93c5fd; text-transform: uppercase; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; position: relative; z-index: 2; }
        .next-exam-label.green-label { color: #6ee7b7; }
        .pulse-dot { width: 6px; height: 6px; background: #60a5fa; border-radius: 50%; animation: pulseGlow 1.5s ease-in-out infinite; }
        .pulse-dot.green-dot { background: #34d399; }
        @keyframes pulseGlow { 0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(96,165,250,0.5); } 50% { opacity: 0.7; transform: scale(1.2); box-shadow: 0 0 0 4px rgba(96,165,250,0); } }
        .exam-title { font-size: 19px; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 4px; position: relative; z-index: 2; animation: slideUp 0.4s ease both; }
        .exam-date-line { font-size: 12px; color: #93c5fd; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; position: relative; z-index: 2; font-weight: 500; animation: slideUp 0.4s ease 0.05s both; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: relative; z-index: 2; }
        .countdown-box { background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 10px 4px 8px; text-align: center; animation: boxPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
        .countdown-box:nth-child(1) { animation-delay: 0.05s; }
        .countdown-box:nth-child(2) { animation-delay: 0.1s; }
        .countdown-box:nth-child(3) { animation-delay: 0.15s; }
        .countdown-box:nth-child(4) { animation-delay: 0.2s; }
        @keyframes boxPop { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
        .countdown-value { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: #fff; line-height: 1; display: block; }
        .countdown-label { font-size: 9px; color: #93c5fd; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; display: block; }
        .finished-state { text-align: center; padding: 10px 0; position: relative; z-index: 2; animation: slideUp 0.4s ease both; }
        .finished-icon { font-size: 36px; margin-bottom: 6px; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        .tabs-section { padding: 10px 14px 6px; flex-shrink: 0; }
        .tab-bar { display: flex; gap: 4px; padding: 4px; background: var(--tab-bg); border-radius: 14px; margin-bottom: 8px; transition: background 0.4s ease; }
        .tab-btn { flex: 1; padding: 8px; font-size: 13px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: all 0.3s cubic-bezier(0.34,1.2,0.64,1); font-family: 'Noto Sans Bengali', sans-serif; }
        .tab-btn.active { background: var(--accent-blue); color: #fff; box-shadow: 0 4px 14px rgba(59,130,246,0.4); transform: scale(1.02); }
        .tab-btn.active-green { background: var(--accent-green); color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,0.4); transform: scale(1.02); }
        .tab-btn.inactive { background: transparent; color: var(--text-muted); }
        .tab-btn.inactive:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }

        .options-grid {
            display: grid; gap: 8px;
            position: relative; overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease, margin-bottom 0.3s ease;
            max-height: 0; opacity: 0; margin-bottom: 0;
        }
        .options-grid.visible { max-height: 70px; opacity: 1; margin-bottom: 6px; }
        
        .select-box { display: flex; flex-direction: column; gap: 4px; }
        .select-box label { font-size: 10px; font-weight: 600; color: var(--text-muted); padding-left: 4px; }
        .select-inner { position: relative; }
        .styled-select { width: 100%; appearance: none; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); font-size: 12px; font-weight: 500; font-family: 'Noto Sans Bengali', sans-serif; border-radius: 10px; padding: 8px 24px 8px 10px; outline: none; cursor: pointer; transition: border-color 0.2s, background 0.4s; }
        .styled-select:focus { border-color: var(--accent-blue); }
        .select-arrow { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }

        .commerce-note { font-size: 11px; color: #a78bfa; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 10px; padding: 7px 12px; margin-top: 6px; display: none; }
        .commerce-note.visible { display: block; }

        .list-section { flex: 1; overflow-y: auto; padding: 4px 14px 16px; scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) transparent; }
        .list-section::-webkit-scrollbar { width: 3px; }
        .list-section::-webkit-scrollbar-track { background: transparent; }
        .list-section::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
        .list-title { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; padding-left: 4px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .exam-card { padding: 12px 14px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 8px; background: var(--bg-card); transition: all 0.3s ease; animation: cardIn 0.3s ease both; cursor: default; }
        .exam-card:hover { background: var(--bg-card-hover); transform: translateX(2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .exam-card.card-completed { opacity: 0.5; background: transparent; }
        .exam-card.card-ongoing { background: rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.3); }
        .exam-card.card-next { background: rgba(59,130,246,0.07); border-color: rgba(59,130,246,0.4); box-shadow: 0 0 0 1px rgba(59,130,246,0.1), 0 8px 24px rgba(59,130,246,0.1); }
        @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
        .subject-name { font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--text-primary); transition: color 0.3s; }
        .subject-name.completed { text-decoration: line-through; color: var(--text-muted); }
        .subject-name.ongoing { color: #34d399; }
        .subject-name.next { color: var(--accent-blue-light); }
        .badge { flex-shrink: 0; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-left: 8px; margin-top: 1px; }
        .badge-done { color: #34d399; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); }
        .badge-ongoing { color: #34d399; background: rgba(52,211,153,0.08); animation: pulseText 1.5s ease infinite; }
        .badge-next { color: #fff; background: var(--accent-blue); box-shadow: 0 2px 8px rgba(59,130,246,0.35); }
        .badge-days { color: var(--text-muted); background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .card-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
        .date-pill { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.04); padding: 3px 8px; border-radius: 8px; display: flex; align-items: center; gap: 4px; border: 1px solid var(--border-color); flex-wrap: wrap; }
        [data-theme="light"] .date-pill { background: rgba(0,0,0,0.04); }
        .gap-pill { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 8px; }
        .gap-positive { color: #818cf8; background: rgba(99,102,241,0.1); }
        .gap-zero { color: #f87171; background: rgba(248,113,113,0.1); }
        .time-tag { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 6px; white-space: nowrap; }
        .time-morning   { color: #fbbf24; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2); }
        .time-afternoon { color: #fb923c; background: rgba(251,146,60,0.1); border: 1px solid rgba(251,146,60,0.2); }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="header-section">
        <div class="top-bar">
            <a href="https://linkedin.com/in/RahatAhmedX" target="_blank" rel="noopener noreferrer" class="dev-badge">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Developed by <strong style="color:#bfdbfe">Rahat</strong>
            </a>
            <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
                <div class="toggle-icon-wrap">
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg class="icon-sun"  width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </div>
                <span class="toggle-label" id="toggleLabel">ডার্ক মোড</span>
            </button>
        </div>

        <div class="exam-switcher">
            <button class="exam-switch-btn active-alim" id="btnAlim">আলিম ২০২৬</button>
            <button class="exam-switch-btn inactive-sw"  id="btnHSC">HSC ২০২৬</button>
        </div>

        <div id="nextExamContent"></div>
    </div>

    <div class="tabs-section">
        <div class="tab-bar" id="tabBar">
            <button class="tab-btn" id="btnG1"></button>
            <button class="tab-btn" id="btnG2"></button>
            <button class="tab-btn" id="btnG3" style="display:none"></button>
        </div>
        
        <div class="options-grid" id="optionalWrapper">
            <div class="select-box" id="boxOpt1">
                <label id="lblOpt1">৪র্থ বিষয় (আবশ্যিক)</label>
                <div class="select-inner">
                    <select class="styled-select" id="selectOpt1"></select>
                    <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </div>
            </div>
            <div class="select-box" id="boxOpt2">
                <label>ঐচ্ছিক বিষয়</label>
                <div class="select-inner">
                    <select class="styled-select" id="selectOpt2"></select>
                    <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </div>
            </div>
        </div>

        <div class="commerce-note" id="commerceNote">💡 প্রকৌশল অঙ্কন ও ওয়ার্কশপ পত্রের পরীক্ষা নিজ কলেজে অনুষ্ঠিত হবে।</div>
    </div>

    <div class="list-section">
        <div class="list-title" id="routineTitle"></div>
        <div id="routineList"></div>
    </div>
</div>

const getStatus = (dateStr, now) => {
    const d = new Date(dateStr), diff = d - now;
    if (diff < 0) {
        if (now > new Date(d.getTime() + 3*60*60*1000)) return { status:'completed' };
        return { status:'ongoing' };
    }
    return {
        status:'upcoming',
        days:    Math.floor(diff/86400000),
        hours:   Math.floor((diff%86400000)/3600000),
        minutes: Math.floor((diff%3600000)/60000),
        seconds: Math.floor((diff%60000)/1000),
        diff
    };
};

const calcGap = (cur, prev) => {
    const d1 = new Date(prev); d1.setHours(0,0,0,0);
    const d2 = new Date(cur);  d2.setHours(0,0,0,0);
    return Math.max(0, Math.floor((d2-d1)/86400000) - 1);
};

const isAfternoon = dateStr => new Date(dateStr).getHours() >= 12;

function buildRoutine() {
    const opts = currentGroup === 'Arts' ? [currentOpt1] : [currentOpt1, currentOpt2];
    if (currentExam === 'Alim') {
        return currentGroup === 'Science' ? ALIM_SCIENCE : buildAlimArts(opts);
    }
    if (currentGroup === 'Science')  return buildHSCScience(opts);
    if (currentGroup === 'Arts')     return buildHSCArts(opts);
    return buildHSCCommerce(opts);
}

function getOptionsListKey() {
    if (currentExam === 'Alim' && currentGroup === 'Arts') return 'Alim_Arts';
    if (currentExam === 'HSC') {
        if (currentGroup === 'Science') return 'HSC_Science';
        if (currentGroup === 'Arts') return 'HSC_Arts';
        if (currentGroup === 'Commerce') return 'HSC_Commerce';
    }
    return null;
}

function setupUI() {
    const g1 = document.getElementById('btnG1');
    const g2 = document.getElementById('btnG2');
    const g3 = document.getElementById('btnG3');
    const wrap = document.getElementById('optionalWrapper');
    const note = document.getElementById('commerceNote');
    const isAlim = currentExam === 'Alim';
    const activeClass = isAlim ? 'tab-btn active-green' : 'tab-btn active';

    g1.textContent = 'বিজ্ঞান';
    g2.textContent = isAlim ? 'সাধারণ' : 'মানবিক'; // আর্টস এর নাম সাধারণ/মানবিক

    if (isAlim) {
        g3.style.display = 'none';
        g1.className = currentGroup === 'Science' ? activeClass : 'tab-btn inactive';
        g2.className = currentGroup === 'Arts'    ? activeClass : 'tab-btn inactive';
    } else {
        g3.style.display = '';
        g3.textContent = 'বাণিজ্য';
        g1.className = currentGroup === 'Science'  ? activeClass : 'tab-btn inactive';
        g2.className = currentGroup === 'Arts'     ? activeClass : 'tab-btn inactive';
        g3.className = currentGroup === 'Commerce' ? activeClass : 'tab-btn inactive';
    }

    const listKey = getOptionsListKey();

    if (!listKey) {
        wrap.classList.remove('visible');
        note.classList.remove('visible');
        return;
    }

    const options = OPTIONS_DICT[listKey];
    let validVals = options.map(o => o.val);
    
    // Validate currentOpt1
    if (!validVals.includes(currentOpt1)) currentOpt1 = validVals[0];

    const isArts = currentGroup === 'Arts';
    
    if (isArts) {
        // আর্টস এর জন্য শুধুমাত্র ১টি অপশন দেখাবে
        document.getElementById('boxOpt2').style.display = 'none';
        document.getElementById('lblOpt1').textContent = 'ঐচ্ছিক বিষয়';
        document.getElementById('optionalWrapper').style.gridTemplateColumns = '1fr';
        
        let html1 = '';
        options.forEach(o => {
            html1 += `<option value="${o.val}" ${o.val === currentOpt1 ? 'selected' : ''}>${o.text}</option>`;
        });
        document.getElementById('selectOpt1').innerHTML = html1;
        
    } else {
        // বিজ্ঞান ও কমার্সের জন্য ২টি অপশন দেখাবে
        document.getElementById('boxOpt2').style.display = 'flex';
        document.getElementById('lblOpt1').textContent = '৪র্থ বিষয় (আবশ্যিক)';
        document.getElementById('optionalWrapper').style.gridTemplateColumns = '1fr 1fr';
        
        // Validate currentOpt2
        if (!validVals.includes(currentOpt2) || currentOpt2 === currentOpt1) {
            currentOpt2 = validVals.find(v => v !== currentOpt1) || validVals[0];
        }
        
        let html1 = ''; let html2 = '';
        options.forEach(o => {
            html1 += `<option value="${o.val}" ${o.val === currentOpt1 ? 'selected' : ''}>${o.text}</option>`;
            html2 += `<option value="${o.val}" ${o.val === currentOpt2 ? 'selected' : ''}>${o.text}</option>`;
        });
        
        document.getElementById('selectOpt1').innerHTML = html1;
        document.getElementById('selectOpt2').innerHTML = html2;
    }
    
    wrap.classList.add('visible');
    
    // Commerce Note
    let showNote = !isAlim && currentGroup === 'Commerce' && (currentOpt1 === 'Engineering' || (!isArts && currentOpt2 === 'Engineering'));
    note.classList.toggle('visible', showNote);
}

function handleOptionChange(isOpt1, newValue) {
    if (isOpt1) {
        if (currentGroup !== 'Arts' && newValue === currentOpt2) currentOpt2 = currentOpt1; // Swap
        currentOpt1 = newValue;
    } else {
        if (newValue === currentOpt1) currentOpt1 = currentOpt2; // Swap
        currentOpt2 = newValue;
    }
    refresh();
}

document.getElementById('selectOpt1').addEventListener('change', e => handleOptionChange(true, e.target.value));
document.getElementById('selectOpt2').addEventListener('change', e => handleOptionChange(false, e.target.value));

function renderList() {
    const now = new Date();
    const upcoming = currentRoutine.filter(e => getStatus(e.date, now).status === 'upcoming');
    const next = upcoming[0] || null;
    document.getElementById('routineTitle').innerHTML = `${SVG.book} সম্পূর্ণ রুটিন (${toBnNum(currentRoutine.length)} বিষয়)`;
    let html = '';
    currentRoutine.forEach((exam, i) => {
        const s = getStatus(exam.date, now);
        const isNext = next && next.id === exam.id;
        const gap = i > 0 ? calcGap(exam.date, currentRoutine[i-1].date) : 0;
        const pm = isAfternoon(exam.date);
        let cardClass = 'exam-card', subjectClass = 'subject-name', badge = '';
        if (s.status === 'completed') {
            cardClass += ' card-completed'; subjectClass += ' completed';
            badge = `<span class="badge badge-done">সম্পন্ন</span>`;
        } else if (s.status === 'ongoing') {
            cardClass += ' card-ongoing'; subjectClass += ' ongoing';
            badge = `<span class="badge badge-ongoing">● চলছে</span>`;
        } else if (isNext) {
            cardClass += ' card-next'; subjectClass += ' next';
            badge = `<span class="badge badge-next">পরবর্তী</span>`;
        } else {
            badge = `<span class="badge badge-days">${toBnNum(s.days)} দিন বাকি</span>`;
        }
        let gapBadge = '';
        if (i > 0 && s.status !== 'completed') {
            gapBadge = `<span class="gap-pill ${gap > 0 ? 'gap-positive' : 'gap-zero'}">${gap > 0 ? `${toBnNum(gap)} দিন গ্যাপ` : 'গ্যাপ নেই'}</span>`;
        }
        const timeTag = pm
            ? `<span class="time-tag time-afternoon">দুপুর ২টা</span>`
            : `<span class="time-tag time-morning">সকাল ১০টা</span>`;
        html += `
        <div class="${cardClass}" style="animation-delay:${i*0.04}s">
            <div class="card-top"><span class="${subjectClass}">${exam.subject}</span>${badge}</div>
            <div class="card-bottom">
                <span class="date-pill">${SVG.cal} ${fmtDate(exam.date)} • ${fmtDay(exam.date)} ${timeTag}</span>
                ${gapBadge}
            </div>
        </div>`;
    });
    document.getElementById('routineList').innerHTML = html;
}

function updateTimer() {
    const now = new Date();
    const upcoming = currentRoutine.filter(e => getStatus(e.date, now).status === 'upcoming');
    const next = upcoming[0] || null;
    const nec = document.getElementById('nextExamContent');
    const isAlim = currentExam === 'Alim';
    
    // Install Button Color logic
    const installBtnCls = isAlim ? 'install-btn alim' : 'install-btn hsc';
    
    const installBtnHTML = window.AndroidApp ? '' : `
        <a href="https://github.com/Rahat0764/AlimRoutine/releases/download/v1.0/AlimRoutine_V1.apk" class="${installBtnCls}" target="_blank" rel="noopener noreferrer">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Install App
        </a>`;
        
    if (!next) {
        nec.innerHTML = `
        <div style="position:absolute;right:16px;top:16px;z-index:10;">${installBtnHTML}</div>
        <div class="finished-state">
            <div class="finished-icon">🎉</div>
            <div style="font-size:18px;font-weight:800;color:#fff;margin-bottom:4px">সব পরীক্ষা শেষ!</div>
            <div style="font-size:12px;color:#93c5fd">আলহামদুলিল্লাহ, পরীক্ষা সম্পন্ন হয়েছে।</div>
        </div>`;
        return;
    }
    const s = getStatus(next.date, now);
    const vals = [s.days, s.hours, s.minutes, s.seconds];
    const labels = ['দিন','ঘণ্টা','মিনিট','সেকেন্ড'];
    const existingTitle = nec.querySelector('.exam-title');
    const existingGrid  = nec.querySelector('.countdown-grid');
    if (existingGrid && existingTitle && existingTitle.textContent === next.subject) {
        const spans = nec.querySelectorAll('.countdown-value');
        vals.forEach((v,i) => { const t = toBnNum(String(v).padStart(2,'0')); if (spans[i] && spans[i].textContent !== t) spans[i].textContent = t; });
        return;
    }

    const timeStr = isAfternoon(next.date) ? 'দুপুর ২:০০' : 'সকাল ১০:০০';
    const dotCls   = isAlim ? 'pulse-dot green-dot' : 'pulse-dot';
    const labelCls = isAlim ? 'next-exam-label green-label' : 'next-exam-label';
    const boxes = vals.map((v,i) => `
        <div class="countdown-box">
            <span class="countdown-value">${toBnNum(String(v).padStart(2,'0'))}</span>
            <span class="countdown-label">${labels[i]}</span>
        </div>`).join('');
    nec.innerHTML = `
    <div class="${labelCls}"><div class="${dotCls}"></div> পরবর্তী পরীক্ষা</div>
    <div style="display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;animation:slideUp 0.4s ease both;margin-bottom:4px;">
        <div class="exam-title" style="animation:none;margin-bottom:0;">${next.subject}</div>
        ${installBtnHTML}
    </div>
    <div class="exam-date-line">${SVG.cal14} ${fmtDate(next.date)} • ${fmtDay(next.date)} (${timeStr})</div>
    <div class="countdown-grid">${boxes}</div>`;
}

function saveState() {
    localStorage.setItem('exam',     currentExam);
    localStorage.setItem('group',    currentGroup);
    if(currentOpt1) localStorage.setItem('opt1', currentOpt1);
    if(currentOpt2) localStorage.setItem('opt2', currentOpt2);
    if (window.AndroidApp) {
        try { window.AndroidApp.savePreferences(currentExam, currentGroup, currentOpt1); } catch(e){}
    }
}

function refresh() {
    setupUI();
    currentRoutine = buildRoutine();
    renderList();
    updateTimer();
    saveState();
}

document.getElementById('btnG1').addEventListener('click', () => {
    currentGroup = 'Science'; refresh();
});
document.getElementById('btnG2').addEventListener('click', () => {
    currentGroup = 'Arts'; refresh();
});
document.getElementById('btnG3').addEventListener('click', () => {
    currentGroup = 'Commerce'; refresh();
});

document.getElementById('btnAlim').addEventListener('click', () => {
    currentExam = 'Alim';
    document.getElementById('btnAlim').className = 'exam-switch-btn active-alim';
    document.getElementById('btnHSC').className  = 'exam-switch-btn inactive-sw';
    if (currentGroup === 'Commerce') { currentGroup = 'Science'; }
    refresh();
});
document.getElementById('btnHSC').addEventListener('click', () => {
    currentExam = 'HSC';
    document.getElementById('btnHSC').className  = 'exam-switch-btn active-hsc';
    document.getElementById('btnAlim').className = 'exam-switch-btn inactive-sw';
    refresh();
});

const darkToggle = document.getElementById('darkToggle');
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('toggleLabel').textContent = savedTheme === 'dark' ? 'ডার্ক মোড' : 'লাইট মোড';
document.getElementById('theme-meta').setAttribute('content', savedTheme === 'dark' ? '#0f172a' : '#f0f4ff');
darkToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const t = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    document.getElementById('theme-meta').setAttribute('content', t === 'dark' ? '#0f172a' : '#f0f4ff');
    document.getElementById('toggleLabel').textContent = t === 'dark' ? 'ডার্ক মোড' : 'লাইট মোড';
});

if (currentExam === 'Alim') {
    document.getElementById('btnAlim').className = 'exam-switch-btn active-alim';
    document.getElementById('btnHSC').className  = 'exam-switch-btn inactive-sw';
} else {
    document.getElementById('btnHSC').className  = 'exam-switch-btn active-hsc';
    document.getElementById('btnAlim').className = 'exam-switch-btn inactive-sw';
}

refresh();
setInterval(updateTimer, 1000);
</script>
</body>
</html>
